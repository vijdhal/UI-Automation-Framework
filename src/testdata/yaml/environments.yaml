# Keyed by environment name (dev | qa | uat).
# baseUrl and apiUrl are read from process.env at runtime (loaded from .env.* by playwright.config.ts).
# Usage: yamlReader.getEnvironment(process.env['ENV'] ?? 'dev')

dev:
  timeout: 30000
  features:
    darkMode: true
    betaFeatures: true
    mockPayments: true
    maintenanceBanner: false

qa:
  timeout: 30000
  features:
    darkMode: true
    betaFeatures: false
    mockPayments: true
    maintenanceBanner: false

uat:
  timeout: 45000
  features:
    darkMode: false
    betaFeatures: false
    mockPayments: false
    maintenanceBanner: true
